<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
  </defs>

  <!-- Background: pure black, subway station -->
  <rect width="1200" height="630" fill="#000" />
  <rect width="1200" height="630" fill="url(#vignette)" />

  <!-- Top white rule (station sign divider) -->
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#fff" stroke-width="4" />

  <!-- Title: HEY SUBWAY -->
  <text x="80" y="80" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" letter-spacing="2" fill="#fff">HEY SUBWAY</text>

  <!-- Subtitle -->
  <text x="80" y="140" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="500" letter-spacing="8" fill="#999">REAL-TIME · NYCT</text>

  <!-- Line bullets — row 1: numbered lines -->
  <!-- Red: 1, 2, 3 -->
  <circle cx="140" cy="280" r="38" fill="#ee352e" />
  <text x="140" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <circle cx="230" cy="280" r="38" fill="#ee352e" />
  <text x="230" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <circle cx="320" cy="280" r="38" fill="#ee352e" />
  <text x="320" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <!-- Green: 4, 5, 6 -->
  <circle cx="430" cy="280" r="38" fill="#00933c" />
  <text x="430" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">4</text>

  <circle cx="520" cy="280" r="38" fill="#00933c" />
  <text x="520" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">5</text>

  <circle cx="610" cy="280" r="38" fill="#00933c" />
  <text x="610" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">6</text>

  <!-- Purple: 7 -->
  <circle cx="720" cy="280" r="38" fill="#b933ad" />
  <text x="720" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">7</text>

  <!-- Gray: S -->
  <circle cx="810" cy="280" r="38" fill="#808183" />
  <text x="810" y="296" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">S</text>

  <!-- Line bullets — row 2: letter lines -->
  <!-- Blue: A, C, E -->
  <circle cx="140" cy="390" r="38" fill="#0039a6" />
  <text x="140" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">A</text>

  <circle cx="230" cy="390" r="38" fill="#0039a6" />
  <text x="230" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">C</text>

  <circle cx="320" cy="390" r="38" fill="#0039a6" />
  <text x="320" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">E</text>

  <!-- Orange: B, D, F, M -->
  <circle cx="430" cy="390" r="38" fill="#ff6319" />
  <text x="430" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">B</text>

  <circle cx="520" cy="390" r="38" fill="#ff6319" />
  <text x="520" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">D</text>

  <circle cx="610" cy="390" r="38" fill="#ff6319" />
  <text x="610" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">F</text>

  <circle cx="700" cy="390" r="38" fill="#ff6319" />
  <text x="700" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">M</text>

  <!-- Yellow: N, Q, R, W (black text) -->
  <circle cx="810" cy="390" r="38" fill="#fccc0a" />
  <text x="810" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#000" text-anchor="middle">N</text>

  <circle cx="900" cy="390" r="38" fill="#fccc0a" />
  <text x="900" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#000" text-anchor="middle">Q</text>

  <circle cx="990" cy="390" r="38" fill="#fccc0a" />
  <text x="990" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#000" text-anchor="middle">R</text>

  <circle cx="1080" cy="390" r="38" fill="#fccc0a" />
  <text x="1080" y="406" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#000" text-anchor="middle">W</text>

  <!-- Line bullets — row 3: remaining lines -->
  <!-- Lime: G -->
  <circle cx="140" cy="500" r="38" fill="#6cbe45" />
  <text x="140" y="516" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">G</text>

  <!-- Gray: L -->
  <circle cx="230" cy="500" r="38" fill="#a7a9ac" />
  <text x="230" y="516" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">L</text>

  <!-- Brown: J, Z -->
  <circle cx="340" cy="500" r="38" fill="#996633" />
  <text x="340" y="516" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">J</text>

  <circle cx="430" cy="500" r="38" fill="#996633" />
  <text x="430" y="516" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#fff" text-anchor="middle">Z</text>

  <!-- Bottom white rule -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#333" stroke-width="1" />

  <!-- Footer -->
  <text x="600" y="600" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="6" fill="#555"
        text-anchor="middle">DATA · MTA GTFS-REALTIME · UNAFFILIATED WITH MTA</text>
</svg>
